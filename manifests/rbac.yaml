apiVersion: v1
kind: ServiceAccount
metadata:
  name: limited-user
  namespace: secure-app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: secure-app
  name: read-only
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: read-only-binding
  namespace: secure-app
subjects:
- kind: ServiceAccount
  name: limited-user
  namespace: secure-app
roleRef:
  kind: Role
  name: read-only
  apiGroup: rbac.authorization.k8s.io
